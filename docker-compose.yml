services:
  app-db:
    image: postgres:16-alpine
    container_name: vt-attendance-db
    environment:
      POSTGRES_DB: vt_check_attendance
      POSTGRES_USER: vtadmin
      POSTGRES_PASSWORD: VtAttendance@2026
    ports:
      - "45432:5432"
    volumes:
      - app_db_data:/var/lib/postgresql/data
    restart: unless-stopped

  app:
    build: .
    container_name: vt-attendance-app
    ports:
      - "3333:3333"
    env_file:
      - .env.local
    environment:
      APP_DB_HOST: app-db
      APP_DB_PORT: 5432
    depends_on:
      - app-db
    restart: unless-stopped

volumes:
  app_db_data:
